name: build-windows

# 在 GitHub 网页 Actions 页手动点 "Run workflow" 即可触发（不需要你有 Windows 电脑）。
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 安装 Python 依赖 + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 安装 playwright driver（含自带 node，运行时签名复用）
        run: python -m playwright install chromium
        # chromium 这里装只是让 driver 就位；打包不带它，运行时再下载。

      - name: 生成 node_modules（签名用；--ignore-scripts 跳过 canvas 原生编译）
        run: |
          node --version
          npm --version
          npm install --ignore-scripts

      - name: PyInstaller 打包
        run: >
          pyinstaller --noconfirm --clean --windowed
          --name liangbashuazi
          --paths .
          --collect-submodules desktop --collect-submodules web
          --collect-submodules dy_apis --collect-submodules dy_live
          --collect-all customtkinter --collect-all playwright
          --add-data "desktop/claude_theme.json;desktop"
          desktop/client.py

      - name: 后处理：拷 static + node_modules 进包
        shell: pwsh
        run: |
          $dest = "dist/liangbashuazi/_internal"
          Copy-Item -Recurse -Force static "$dest/static"
          Copy-Item -Recurse -Force node_modules "$dest/node_modules"

      - name: 冒烟自检（在 Windows 上实际运行 exe --selfcheck）
        shell: pwsh
        run: |
          $exe = "dist/liangbashuazi/liangbashuazi.exe"
          Write-Host "运行 $exe --selfcheck ..."
          $p = Start-Process -FilePath $exe -ArgumentList "--selfcheck" -Wait -PassThru
          $sentinel = Join-Path $env:USERPROFILE "liangbashuazi_selfcheck.txt"
          $log = Join-Path $env:USERPROFILE "liangbashuazi.log"
          Write-Host "=== selfcheck 结果 ==="
          if (Test-Path $sentinel) { Get-Content $sentinel } else { Write-Host "(无 selfcheck 文件)" }
          Write-Host "=== app 日志 ==="
          if (Test-Path $log) { Get-Content $log } else { Write-Host "(无日志)" }
          if ($p.ExitCode -ne 0) {
            Write-Error "冒烟自检失败，退出码 $($p.ExitCode)（导入/建服务/签名 至少一步崩了，详见上方）"
            exit 1
          }
          Write-Host "冒烟自检通过：导入 + 建服务 + a_bogus 签名 全部 OK"

      - name: 打包成 zip
        shell: pwsh
        run: Compress-Archive -Path dist/liangbashuazi/* -DestinationPath liangbashuazi-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: liangbashuazi-windows
          path: liangbashuazi-windows.zip
