name: build-windows

# 在 GitHub 网页 Actions 页手动点 "Run workflow" 即可触发（不需要你有 Windows 电脑）。
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write   # 允许 GITHUB_TOKEN 创建 Release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          # 用 3.11：PyInstaller 打包 asyncio 在 3.12 上有 class Popen(subprocess.Popen)
          # 触发 "the first argument must be callable" 的已知坑；3.11 最稳。
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 安装 Python 依赖 + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 安装 playwright + chromium（装到本地目录，稍后整体打包进发行包）
        shell: pwsh
        run: |
          $env:PLAYWRIGHT_BROWSERS_PATH = "$PWD\ms-playwright"
          python -m playwright install chromium
          Write-Host "chromium 已安装到 ms-playwright："
          Get-ChildItem ms-playwright | Select-Object Name

      - name: 生成 node_modules（签名用；--ignore-scripts 跳过 canvas 原生编译）
        run: |
          node --version
          npm --version
          npm install --ignore-scripts

      - name: PyInstaller 打包
        run: >
          pyinstaller --noconfirm --clean --windowed
          --name liangbashuazi
          --paths .
          --collect-submodules desktop --collect-submodules web
          --collect-submodules dy_apis --collect-submodules dy_live
          --collect-all customtkinter --collect-all playwright
          --add-data "desktop/claude_theme.json;desktop"
          desktop/client.py

      - name: 后处理：拷 static + node_modules + chromium 进包
        shell: pwsh
        run: |
          $dest = "dist/liangbashuazi/_internal"
          Copy-Item -Recurse -Force static "$dest/static"
          Copy-Item -Recurse -Force node_modules "$dest/node_modules"
          # 把 chromium 内核打进包，用户无需联网下载
          Copy-Item -Recurse -Force ms-playwright "$dest/ms-playwright"
          Write-Host "已打包 chromium，包内 ms-playwright："
          Get-ChildItem "$dest/ms-playwright" | Select-Object Name

      - name: 冒烟自检（在 Windows 上实际运行 exe --selfcheck）
        shell: pwsh
        run: |
          $exe = "dist/liangbashuazi/liangbashuazi.exe"
          Write-Host "运行 $exe --selfcheck ..."
          $p = Start-Process -FilePath $exe -ArgumentList "--selfcheck" -Wait -PassThru
          $sentinel = Join-Path $env:USERPROFILE "liangbashuazi_selfcheck.txt"
          $log = Join-Path $env:USERPROFILE "liangbashuazi.log"
          Write-Host "=== selfcheck 结果 ==="
          if (Test-Path $sentinel) { Get-Content $sentinel } else { Write-Host "(无 selfcheck 文件)" }
          Write-Host "=== app 日志 ==="
          if (Test-Path $log) { Get-Content $log } else { Write-Host "(无日志)" }
          if ($p.ExitCode -ne 0) {
            Write-Error "冒烟自检失败，退出码 $($p.ExitCode)（导入/建服务/签名 至少一步崩了，详见上方）"
            exit 1
          }
          Write-Host "冒烟自检通过：导入 + 建服务 + a_bogus 签名 全部 OK"

      - name: 打包成 zip
        shell: pwsh
        run: Compress-Archive -Path dist/liangbashuazi/* -DestinationPath liangbashuazi-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: liangbashuazi-windows
          path: liangbashuazi-windows.zip

      - name: 发布到 Releases（固定 tag=windows，永久链接稳定）
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $notes = "GitHub 自动构建并通过 Windows 冒烟自检（导入 + 建服务 + a_bogus 签名 + 内置 chromium）。下载解压后双击 liangbashuazi.exe 即用，无需安装 Python/Node。构建号 $($env:GITHUB_RUN_NUMBER)。"
          gh release create windows liangbashuazi-windows.zip --title "两把刷子获客 · Windows" --notes "$notes" 2>$null
          gh release upload windows liangbashuazi-windows.zip --clobber
          gh release edit windows --title "两把刷子获客 · Windows" --notes "$notes"
          Write-Host "永久下载链接："
          Write-Host "https://github.com/$($env:GITHUB_REPOSITORY)/releases/download/windows/liangbashuazi-windows.zip"
